version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gosimple
    - gofmt
    - goimports
    - godot
    - misspell
    - revive
    - bodyclose
    - noctx
    - rowserrcheck
    - sqlclosecheck
  disable:
    - wsl
    - gocognit
    - exhaustruct
    - exhaustive
    - funlen
    - gochecknoglobals

linters-settings:
  govet:
    enable-all: true
    disable:
      - shadow
  revive:
    rules:
      - name: exported
        severity: warning
      - name: var-naming
        severity: warning
  goimports:
    local-prefixes: github.com/samuelbailey123/ditto
  godot:
    scope: declarations
    capital: false

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - errcheck
        - bodyclose
    - path: ".*\\.pb\\.go"
      linters:
        - all
  exclude-generated: strict
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 3m
  tests: true
